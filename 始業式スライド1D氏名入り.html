<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クラス自己紹介</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffe6eb 0%, #ffc2d1 100%);
            font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif;
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* キラキラ背景エフェクト */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            animation: twinkle 3s infinite alternate;
            z-index: 1;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        /* 桜の花びらエフェクト */
        .petal {
            position: absolute;
            background-color: #ffa6b9;
            border-radius: 15px 0px 15px 0px;
            opacity: 0.8;
            box-shadow: 0 0 5px rgba(255, 153, 171, 0.5);
            z-index: 2;
            animation: fall linear infinite, sway ease-in-out infinite alternate;
        }
        @keyframes fall {
            0% { top: -10vh; }
            100% { top: 110vh; }
        }
        @keyframes sway {
            0% { transform: translateX(0px) rotate(0deg); }
            100% { transform: translateX(50px) rotate(45deg); }
        }

        /* スライド画面 */
        #presentation {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 1);
            z-index: 10;
            width: 100%;
        }
        .furigana {
            font-size: 3vw;
            color: #d65c7a;
            margin-bottom: 10px;
            letter-spacing: 0.2em;
            transition: opacity 0.3s ease;
        }
        .name {
            font-size: 10vw;
            font-weight: bold;
            letter-spacing: 0.1em;
            transition: opacity 0.3s ease;
        }

        /* 操作ボタン */
        .controls {
            position: fixed;
            bottom: 30px;
            z-index: 20;
            display: flex;
            gap: 20px;
        }
        button {
            font-size: 1.5rem;
            padding: 10px 30px;
            cursor: pointer;
            border: 2px solid #ffb3c6;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            color: #d65c7a;
            font-weight: bold;
            transition: all 0.2s ease;
            user-select: none;
        }
        button:hover { background: #ffb3c6; color: #fff; }

        /* 進行状況 */
        #counter {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 1.5rem;
            color: #d65c7a;
            z-index: 20;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="effects-container"></div>

    <div id="presentation">
        <div id="counter"></div>
        <div class="furigana" id="furigana">ふりがな</div>
        <div class="name" id="name">名前</div>
        
        <div class="controls">
            <button onclick="prev()">? 前へ</button>
            <button onclick="next()">次へ ?</button>
        </div>
    </div>

    <script>
        // 40名分の名簿データ
        const studentList = [
            { name: "池田　結月", furi: "いけだ ゆづき" },
            { name: "伊藤　凪", furi: "いとう なぎ" },
            { name: "植村　理咲", furi: "うえむら りさ" },
            { name: "宇都　陽衣菜", furi: "うと ひいな" },
            { name: "大澤　奈南穂", furi: "おおさわ ななほ" },
            { name: "太田　有", furi: "おおた ゆう" },
            { name: "岡崎　向希", furi: "おかざき こうき" },
            { name: "尾崎　文寧", furi: "おざき あやね" },
            { name: "小田切　馨子", furi: "おたぎり かおるこ" },
            { name: "加藤　一汰", furi: "かとう いった" },
            { name: "神林　宏太", furi: "かんばやし こうた" },
            { name: "北道　蘭来", furi: "きたみち らら" },
            { name: "小柳　宥悟", furi: "こやなぎ ゆうご" },
            { name: "竿崎　葵", furi: "さおさき あおい" },
            { name: "島田　佳歩", furi: "しまだ かほ" },
            { name: "進藤　尚", furi: "しんどう なお" },
            { name: "鈴木　優唯", furi: "すずき ゆうい" },
            { name: "須原　優誠", furi: "すはら ゆうま" },
            { name: "関　秋帆", furi: "せき あきほ" },
            { name: "関口　瑛大", furi: "せきぐち えいた" },
            { name: "多賀井　智仁", furi: "たがい ともひと" },
            { name: "高瀬　柊", furi: "たかせ しゅう" },
            { name: "高橋　蓮", furi: "たかはし れん" },
            { name: "滝田　凰介", furi: "たきた おうすけ" },
            { name: "田中　瑚珀", furi: "たなか こはく" },
            { name: "店橋　蓮", furi: "たなはし れん" },
            { name: "辻　晋之輔", furi: "つじ しんのすけ" },
            { name: "中嶋　拓哉", furi: "なかじま たくや" },
            { name: "野末　遥生", furi: "のずえ はるき" },
            { name: "服部　龍人", furi: "はっとり りゅうと" },
            { name: "針谷　恭子", furi: "はりや きょうこ" },
            { name: "蛭川　想", furi: "ひるかわ そう" },
            { name: "廣木　寛大", furi: "ひろき かんた" },
            { name: "細井戸　航太", furi: "ほそいど こうた" },
            { name: "湊　雄太", furi: "みなと ゆうた" },
            { name: "宮本　具明", furi: "みやもと ともあき" },
            { name: "村口　瑚子", furi: "むらぐち ここ" },
            { name: "山本　瑛翔", furi: "やまもと えいと" },
            { name: "頼則　このは", furi: "よりのり このは" },
            { name: "和田　陽菜子", furi: "わだ ひなこ" }
        ];

        let currentIndex = 0;

        // キラキラ背景の生成
        for (let i = 0; i < 40; i++) {
            let sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDelay = Math.random() * 3 + 's';
            document.body.appendChild(sparkle);
        }

        // 桜の花びら生成
        function createSakura() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 12 + 10;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            const durationFall = Math.random() * 6 + 6;
            const durationSway = Math.random() * 3 + 2;
            petal.style.animationDuration = `${durationFall}s, ${durationSway}s`;
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, durationFall * 1000);
        }
        setInterval(createSakura, 400);

        // 表示の更新
        function updateDisplay() {
            const nameEl = document.getElementById('name');
            const furiEl = document.getElementById('furigana');
            const counterEl = document.getElementById('counter');

            nameEl.style.opacity = 0;
            furiEl.style.opacity = 0;

            setTimeout(() => {
                const student = studentList[currentIndex];
                nameEl.innerText = student.name;
                furiEl.innerText = student.furi;
                counterEl.innerText = `${currentIndex + 1} / ${studentList.length}`;
                nameEl.style.opacity = 1;
                furiEl.style.opacity = 1;
            }, 300);
        }

        function next() {
            if (currentIndex < studentList.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }

        function prev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                next();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                prev();
            }
        });

        // 初期表示
        window.onload = updateDisplay;
    </script>
</body>
</html>
